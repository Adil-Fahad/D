<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>HALAL SCAN AI</title>
  <meta name="theme-color" content="#7c3aed"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="HalalScan"/>
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span>🕌</span>
        <div>
          <div class="logo-title">HALAL SCAN AI</div>
          <div class="logo-sub">PRO ULTIMATE</div>
        </div>
      </div>
      <div class="header-right">
        <div id="status-dot" class="dot offline"></div>
        <span id="status-text" class="status-text">Connecting…</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- TAB: SIGNALS -->
    <section id="tab-signals" class="tab active">

      <button class="scan-btn" id="scan-btn" onclick="runScan()">
        ⚡ Scan Market Now
      </button>

      <!-- Stats -->
      <div class="stats-row" id="stats-row" style="display:none">
        <div class="stat-pill">
          <div class="stat-val" id="stat-total">0</div>
          <div class="stat-lbl">Signals</div>
        </div>
        <div class="stat-pill">
          <div class="stat-val orange" id="stat-strong">0</div>
          <div class="stat-lbl">Strong</div>
        </div>
        <div class="stat-pill">
          <div class="stat-val green" id="stat-buy">0</div>
          <div class="stat-lbl">Buys</div>
        </div>
        <div class="stat-pill">
          <div class="stat-val purple" id="stat-avg">—</div>
          <div class="stat-lbl">Avg %</div>
        </div>
      </div>

      <!-- Signals list -->
      <div id="scan-status" class="scan-status">
        Tap ⚡ Scan Market Now to find top halal picks.
      </div>
      <div id="signals-list"></div>

    </section>

    <!-- TAB: ANALYZER -->
    <section id="tab-analyzer" class="tab hidden">
      <div class="section-title">🔬 Coin Analyzer</div>

      <div class="search-row">
        <input id="coin-input" class="coin-input" type="text"
               placeholder="BTC, ONDO, FET, RENDER…"
               onkeydown="if(event.key==='Enter') analyzeCoin()"/>
        <button class="go-btn" onclick="analyzeCoin()">Go</button>
      </div>

      <div class="quick-pills">
        <button class="pill" onclick="qa('BTC')">BTC</button>
        <button class="pill" onclick="qa('ETH')">ETH</button>
        <button class="pill" onclick="qa('SOL')">SOL</button>
        <button class="pill" onclick="qa('ONDO')">ONDO</button>
        <button class="pill" onclick="qa('FET')">FET</button>
        <button class="pill" onclick="qa('RENDER')">RENDER</button>
        <button class="pill" onclick="qa('NEAR')">NEAR</button>
        <button class="pill" onclick="qa('LINK')">LINK</button>
        <button class="pill" onclick="qa('TAO')">TAO</button>
        <button class="pill" onclick="qa('AVAX')">AVAX</button>
      </div>

      <div id="analyze-loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Fetching live data + order flow…</span>
      </div>
      <div id="analyze-error" class="error-box hidden"></div>
      <div id="analyze-result"></div>
    </section>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-signals" onclick="showTab('signals')">
      <span class="nav-icon">🎯</span>
      <span>Signals</span>
    </button>
    <button class="nav-item" id="nav-analyzer" onclick="showTab('analyzer')">
      <span class="nav-icon">🔬</span>
      <span>Analyze</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Scan Modal -->
  <div id="scan-modal" class="modal hidden">
    <div class="modal-card">
      <div class="spinner lg"></div>
      <div class="modal-title">Scanning Market…</div>
      <div class="modal-sub">Analyzing all halal USDT pairs.<br>Takes 5–10 minutes.</div>
      <div id="modal-progress" class="modal-progress"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js')
        .then(r => console.log('SW ready'))
        .catch(e => console.log('SW error:', e));
    }
  </script>
</body>
</html>
